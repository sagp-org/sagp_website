        - id: stoic-zeus-and-values-of-nature
          type: lecture
          title: "The Stoic Zeus and the Values of Nature"
          presenters:
            - name: Tony Long
              institution: University of California, Berkeley
          commentators:
            - name: Tad Brennan
              institution: Cornell University
            - name: Gretchen Reydams-Schils
              institution: University of Notre Dame
          abstract: >
            The founders of Stoicism applied a range of terms to the world’s
            active principle, including god, nature, cause, reason, fate, and
            necessity.

            Long examines the conceptual relationship between these
            designations, especially that between nature and Zeus, and considers
            Chrysippus’s claim that Zeus and universal nature are the foundation
            of justice and ethical theory.
