      presentations:
        - id: kouros-descent-parmenides-route-of-search
          title: "The kouros’ descent. A methodical reading of Parmenides’ route of search?"
          type: lecture
          presenters:
            - name: André Laks
              institution: Universidad Panamericana, México City
          commentator:
            name: Michael Della Rocca
            institution: Yale University
            title: Sterling Professor of Philosophy
          abstract: >
            Given that there are only two routes that one can fathom, that of
            being and that of non-being, and given that one of the two routes,
            that of non-being, is an absolute non-starter, one would expect
            that the two sections of the goddess’ exposition, the ontological
            and the physical, are sections of the same route.

            Laks explores the conceptual and hermeneutical conditions under
            which this expectation can be made compatible with the textual
            evidence, with special attention to the phrase hodos dizêsios, the
            “route of search.”
