      presentations:
        - id: use-of-ancient-philosophy
          type: lecture

          title: "What is the Use of Ancient Philosophy?"

          presenters:
            - name: Professor Sir Geoffrey Lloyd
              institution: University of Cambridge

          commentator:
            name: Brad Inwood
            institution: Yale University
            title: William Lampson Professor of Philosophy and Classics

          abstract: >
            Despite the obvious differences between social anthropology and the
            study of antiquity, Lloyd argues that anthropology provides an
            important model for getting the most out of ancient philosophy and
            science.

            The lecture considers how comparative approaches challenge
            assumptions about nature, univocity, proof, and mind/body dualism.
