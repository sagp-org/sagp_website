              institution: University of Cambridge
          commentators:
            - name: Rachel Barney
              institution: University of Toronto
            - name: Alex Long
              institution: University of St. Andrews
          abstract: >
            In Greek usage one is at liberty to refer to or address a divinity
            without naming it. Sedley argues that a philosophical tradition
            running from Xenophanes to Aristotle, and prominently including
            Socrates, went well beyond that permissive practice, keeping gods
            systematically anonymous.

            The reason was not a leaning toward monotheism, but respect for the
            moral homogeneity of the divine.
