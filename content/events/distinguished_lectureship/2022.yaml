          title: "Aristotle’s ‘Political Architect’ and the City of His Prayers"
          presenters:
            - name: Dorothea Frede
              institution: Hamburg University
          commentators:
            - name: Melissa Lane
              institution: Princeton University
            - name: James Warren
              institution: University of Cambridge
          abstract: >
            At the beginning of the Nicomachean Ethics, Aristotle invokes the
            need for a master-science that determines the good human life in a
            community by providing for its order and laws.

            Frede examines legislation, its role in Aristotle’s ethical and
            political thought, and its compatibility with Aristotle’s apparent
            preference for a theoretical form of life.
